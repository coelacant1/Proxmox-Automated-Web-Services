services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - PAWS_DATABASE_URL=postgresql+asyncpg://paws:paws@db:5432/paws
      - PAWS_REDIS_URL=redis://redis:6379/0
      - PAWS_DEBUG=true
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    build: ./backend
    command: celery -A app.worker worker --loglevel=info
    environment:
      - PAWS_DATABASE_URL=postgresql+asyncpg://paws:paws@db:5432/paws
      - PAWS_REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build: ./backend
    command: celery -A app.worker beat --loglevel=info --scheduler redbeat.RedBeatScheduler
    environment:
      - PAWS_DATABASE_URL=postgresql+asyncpg://paws:paws@db:5432/paws
      - PAWS_REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: paws
      POSTGRES_PASSWORD: paws
      POSTGRES_DB: paws
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paws"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
      - "10000-10099:10000-10099"
    volumes:
      - ./scripts/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./scripts/nginx/stream.d:/etc/nginx/stream.d:ro
      - ./scripts/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  # --- Test profile services (docker compose --profile test up) ---
  test-db:
    image: postgres:16-alpine
    profiles: ["test"]
    environment:
      POSTGRES_USER: paws_test
      POSTGRES_PASSWORD: paws_test
      POSTGRES_DB: paws_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paws_test"]
      interval: 3s
      timeout: 3s
      retries: 5

  test-redis:
    image: redis:7-alpine
    profiles: ["test"]
    ports:
      - "6380:6379"
    tmpfs:
      - /data

  test-minio:
    image: minio/minio:latest
    profiles: ["test"]
    command: server /data --console-address ":9003"
    ports:
      - "9002:9000"
      - "9003:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    tmpfs:
      - /data

volumes:
  pgdata:
  redisdata:
  miniodata:
